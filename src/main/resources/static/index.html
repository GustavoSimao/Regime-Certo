<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regime Certo | Simulador de Faturamento</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.5rem; }
        p { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 14px; margin-bottom: 1.2rem; border: 2px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: #3498db; }
        button { width: 100%; padding: 14px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover { background-color: #2ecc71; transform: translateY(-2px); }
        #resultado { margin-top: 2rem; padding: 1.2rem; border-radius: 8px; display: none; text-align: left; line-height: 1.5; }


        .status-OK { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-ALERTA { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-EXCEDIDO { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        strong { display: block; font-size: 1.2rem; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Regime Certo</h2>
    <p>Descubra o melhor enquadramento para sua empresa.</p>

    <input type="number" id="faturamento" placeholder="Faturamento Anual (R$)" step="0.01">
    <button onclick="enviarAnalise()">Consultar Agora</button>

    <div id="resultado">
        <strong id="resRegime"></strong>
        <span id="resMensagem"></span>
    </div>
</div>

<script>
    async function enviarAnalise() {
        const input = document.getElementById('faturamento');
        const divRes = document.getElementById('resultado');
        const faturamento = input.value;

        if (!faturamento || faturamento <= 0) {
            alert("Por favor, insira um valor de faturamento válido.");
            return;
        }

        const payload = {
            faturamento: parseFloat(faturamento)
        };

        try {
            const response = await fetch('http://localhost:8080/analise', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();

                divRes.style.display = 'block';

                divRes.className = 'status-' + data.status;

                document.getElementById('resRegime').innerText = "Regime Ideal: " + data.ideal;
                document.getElementById('resMensagem').innerText = data.mensagem;
            } else {
                alert("Erro: O servidor retornou " + response.status);
            }
        } catch (error) {
            console.error("Erro na conexão:", error);
            alert("Não foi possível conectar ao Backend. Verifique se o projeto está rodando.");
        }
    }
</script>

</body>
</html>
